<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── Primary ── -->
    <title>CheckUrSubs</title>
    <meta name="description" content="Track every subscription. Know exactly what you pay." />
    <meta name="theme-color" content="#080808" />

    <!-- ── PWA manifest ── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Favicon ── -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- ── iOS / Apple ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CheckUrSubs" />

    <!-- ── Apple Splash Screens (опционально, но хорошо для UX) ── -->
    <!-- можно добавить позже через https://progressier.com/pwa-screenshots -->

    <!-- ── OG / Social ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CheckUrSubs" />
    <meta property="og:description" content="Track every subscription. Know exactly what you pay." />
    <meta property="og:url" content="https://checkursubs.vercel.app" />
    <meta property="og:image" content="https://checkursubs.vercel.app/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CheckUrSubs" />

    <meta name="twitter:image" content="https://checkursubs.vercel.app/og-image.png" />
